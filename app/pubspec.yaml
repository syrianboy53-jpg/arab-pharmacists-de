name: arab_pharmacists_de
description: "App for Arabic-speaking pharmacists in Germany — multilingual EN/DE/AR pharmacy & medical terminology, dialogues, drugs, flashcards, quizzes."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/categories.json
    - assets/data/terms.json
    - assets/data/drugs.json
    - assets/data/dialogues.json
    - assets/data/quizzes.json
    - assets/data/payment_accounts.json
    - assets/data/contact_info.json
    - assets/data/material_prices.json
    - assets/data/subscription_plans.json
    - assets/data/aman_experts.json
    - assets/data/aman_legal_guide.json
    - assets/data/aman_emergency.json
    - assets/data/aman_legal_explanations.json
    - assets/data/aman_stories.json
    - assets/data/aman_whatif.json
    - assets/data/aman_relationship_quiz.json
    - assets/data/aman_podcasts.json
    - assets/data/aman_help_centers.json
    - assets/data/aman_jugendamt_risk.json
    - assets/data/aman_plans.json
    - assets/data/aman_private_slots.json
