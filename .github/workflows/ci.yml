name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  data-validation:
    name: Validate JSON datasets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate JSON files parse
        run: |
          for f in data/*.json; do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8')); console.log('OK', '$f');"
          done

  flutter:
    name: Flutter analyze & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
      - run: flutter --version
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
